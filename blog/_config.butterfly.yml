# --------------------------------------
# Butterfly Theme Configuration (5.5.4)
# --------------------------------------

# Navigation
nav:
  display_title: true
  fixed: false

menu:
  主页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  Tags: /tags/ || fas fa-tags
  Categories: /categories/ || fas fa-folder-open

# Code Blocks
code_blocks:
  theme: light
  macStyle: true
  height_limit: false
  word_wrap: true
  copy: true
  language: true
  shrink: false
  fullpage: false

# Social
social:
  fab fa-github: https://github.com/hGhostD || Github

# Image Settings
favicon: /img/favicon.png

avatar:
  img: /img/1024.png
  effect: false

disable_top_img: false

index_img: https://s2.loli.net/2022/01/07/PMyQFVmJ8aOn57U.jpg

default_top_img: https://i.loli.net/2020/05/01/gkihqEjXxJ5UZ1C.jpg

archive_img: https://i.loli.net/2020/05/01/gkihqEjXxJ5UZ1C.jpg

tag_per_img:
  日记: https://s2.loli.net/2022/01/07/PX3iRIcTzZUJBb7.jpg

category_img: https://s2.loli.net/2022/01/07/7GWQbD2YFmzw8iP.jpg

category_per_img:
  归档: https://s2.loli.net/2022/01/07/7GWQbD2YFmzw8iP.jpg

cover:
  index_enable: false
  aside_enable: false
  archives_enable: true
  position: both
  default_cover:
    - https://i.loli.net/2020/05/01/gkihqEjXxJ5UZ1C.jpg

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

error_404:
  enable: true
  subtitle: 'Page Not Found'
  background: https://i.loli.net/2020/05/19/aKOcLiyPl2JQdFD.png

post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# Index Page
subtitle:
  enable: true
  effect: false
  loop: false
  source: 2
  sub:

index_post_content:
  method: 3
  length: 500

# Post
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: false
  decode: false
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

related_post:
  enable: false
  limit: 6
  date_type: created

post_pagination: 1

noticeOutdate:
  enable: false
  style: flat
  limit_day: 500
  position: top
  message_prev: It has been
  message_next: days since the last update, the content of the article may be outdated.

# Footer
footer:
  owner:
    enable: true
    since: 2020
  copyright:
    enable: true
    version: true

# Aside
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: left
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description:
    button:
      enable: false
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/hGhostD
  card_announcement:
    enable: false
    content: 心有猛虎，嗷嗷待哺
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: false
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true

busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# Word Count
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# Copy
copy:
  enable: true
  copyright:
    enable: false
    limit_count: 50

# Math
math:
  use:
  per_page: false

# Search
search:
  use:
  placeholder:

# Share
share:
  use: sharejs
  sharejs:
    sites: facebook,x,wechat,weibo,qq

# Comments
comments:
  use:
  text: true
  lazyload: false
  count: false
  card_post_count: false

# Chat
chat:
  use:
  rightside_button: false
  button_hide_show: false

# Bottom Right Button
rightside_bottom:

translate:
  enable: false
  default: 繁
  defaultEncoding: 2
  translateDelay: 0
  msgToTraditionalChinese: '繁'
  msgToSimplifiedChinese: '簡'

readmode: true

darkmode:
  enable: true
  button: true
  autoChangeMode: false

# Display mode - light (default) / dark
display_mode: dark

# Effect
enter_transitions: true

preloader: false

# Theme Color
theme_color:
  enable: true
  main: "#49B1F5"
  paginator: "#00c4b6"
  button_hover: "#FF7242"
  text_selection: "#00c4b6"
  link_color: "#99a9bf"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#00c4b6"
  blockquote_padding_color: "#49b1f5"
  blockquote_background_color: "#49b1f5"
  scrollbar_color: "#49b1f5"
  meta_theme_color_light: "ffffff"
  meta_theme_color_dark: "#0d0d0d"

# Beautify
beautify:
  enable: false
  field: post
  title_prefix_icon: '\f0c1'
  title_prefix_icon_color: '#F47466'

# The setting of divider icon
hr_icon:
  enable: true
  icon:
  icon_top:

# Lightbox
lightbox: fancybox

# Photofigcaption
photofigcaption: true

# Anchor
anchor:
  auto_update: false
  click_to_scroll: false

# Other
pjax:
  enable: false

aplayerInject:
  enable: false
  per_page: true

instantpage: false

lazyload:
  enable: false
  field: site
  placeholder:
  blur: false

# Open Graph
Open_Graph_meta:
  enable: true

css_prefix: true

# Inject
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
  bottom:
    # ICP Beian
    - '<div style="text-align:center;padding:10px 0"><a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">辽ICP备2021008629号-2</a></div>'
